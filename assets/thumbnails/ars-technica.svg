<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="48" height="48">
  <!-- Orbital ring 1: horizontal ellipse -->
  <ellipse cx="240" cy="240" rx="210" ry="70" fill="none" stroke="#CC3300" stroke-width="22"/>
  <!-- Orbital ring 2: rotated 60deg -->
  <ellipse cx="240" cy="240" rx="210" ry="70" fill="none" stroke="#CC3300" stroke-width="22" transform="rotate(60 240 240)"/>
  <!-- Orbital ring 3: rotated 120deg -->
  <ellipse cx="240" cy="240" rx="210" ry="70" fill="none" stroke="#CC3300" stroke-width="22" transform="rotate(120 240 240)"/>
  <!-- Nucleus -->
  <circle cx="240" cy="240" r="48" fill="#CC3300"/>
</svg>
