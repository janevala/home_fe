<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="48" height="48">
  <!-- Camera body -->
  <rect x="40" y="160" width="400" height="260" rx="30" fill="#2A7FD4"/>
  <!-- Viewfinder hump on top -->
  <rect x="160" y="100" width="140" height="70" rx="16" fill="#2A7FD4"/>
  <!-- Lens: outer ring -->
  <circle cx="210" cy="295" r="100" fill="#1A5FA0"/>
  <!-- Lens: mid ring -->
  <circle cx="210" cy="295" r="68" fill="#2A7FD4"/>
  <!-- Lens: inner glass -->
  <circle cx="210" cy="295" r="42" fill="#1A5FA0"/>
  <!-- Lens: center reflection dot -->
  <circle cx="210" cy="295" r="18" fill="#5AAFF0"/>
  <!-- Shutter button -->
  <circle cx="370" cy="195" r="24" fill="#1A5FA0"/>
</svg>
