<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="20" stroke="#2A7FD4" stroke-width="2.5"/>
  <!-- Aperture blades -->
  <g opacity="0.85">
    <line x1="24" y1="8"  x2="24" y2="40" stroke="#2A7FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(0 24 24)"/>
    <line x1="24" y1="8"  x2="24" y2="40" stroke="#2A7FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(60 24 24)"/>
    <line x1="24" y1="8"  x2="24" y2="40" stroke="#2A7FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(120 24 24)"/>
  </g>
  <!-- Center lens circle -->
  <circle cx="24" cy="24" r="7" stroke="#2A7FD4" stroke-width="2.5"/>
  <circle cx="24" cy="24" r="3" fill="#2A7FD4"/>
</svg>
