<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="48" height="48">
  <!-- Newspaper body -->
  <polygon points="60,60  360,60  420,120  420,420  60,420" fill="#B83232"/>

  <!-- Folded corner triangle (cut out) -->
  <polygon points="360,60  420,120  360,120" fill="#7A1A1A"/>

  <!-- Headline bar -->
  <rect x="90" y="100" width="230" height="36" rx="6" fill="#FFFFFF"/>

  <!-- Text lines -->
  <rect x="90" y="165" width="200" height="18" rx="5" fill="#FFFFFF" opacity="0.7"/>
  <rect x="90" y="200" width="240" height="18" rx="5" fill="#FFFFFF" opacity="0.7"/>
  <rect x="90" y="235" width="180" height="18" rx="5" fill="#FFFFFF" opacity="0.7"/>

  <!-- Divider -->
  <line x1="90" y1="275" x2="390" y2="275" stroke="#FFFFFF" stroke-width="6" opacity="0.4"/>

  <!-- Second column lines -->
  <rect x="90"  y="295" width="140" height="16" rx="5" fill="#FFFFFF" opacity="0.5"/>
  <rect x="90"  y="322" width="120" height="16" rx="5" fill="#FFFFFF" opacity="0.5"/>
  <rect x="250" y="295" width="140" height="16" rx="5" fill="#FFFFFF" opacity="0.5"/>
  <rect x="250" y="322" width="100" height="16" rx="5" fill="#FFFFFF" opacity="0.5"/>
</svg>
