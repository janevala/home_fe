<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="48" height="48">
  <!-- Ascending bar chart with upward arrow -->
  <!-- Bar 1 -->
  <rect x="40"  y="300" width="80" height="140" rx="12" fill="#E8742A"/>
  <!-- Bar 2 -->
  <rect x="160" y="200" width="80" height="240" rx="12" fill="#E8742A"/>
  <!-- Bar 3 -->
  <rect x="280" y="100" width="80" height="340" rx="12" fill="#E8742A"/>
  <!-- Upward arrow right side -->
  <line x1="420" y1="400" x2="420" y2="60" stroke="#E8742A" stroke-width="28" stroke-linecap="round"/>
  <polyline points="360,140 420,60 480,140" stroke="#E8742A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
