    <rect x="31" y="15" width="3" height="18" rx="1" fill="#AA151B" opacity="0.7"/>
    <!-- Shield shape -->
    <rect x="19" y="17" width="10" height="11" rx="1" fill="#AA151B" opacity="0.5"/>
    <path d="M19,28 Q24,34 29,28" fill="#AA151B" opacity="0.5"/>
  </g>
</svg>
