<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <clipPath id="round">
      <rect width="48" height="48" rx="10" ry="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#round)">
    <!-- Green background -->
    <rect width="48" height="48" fill="#009C3B"/>
    <!-- Yellow diamond -->
    <polygon points="24,5 45,24 24,43 3,24" fill="#FFDF00"/>
    <!-- Blue circle -->
    <circle cx="24" cy="24" r="10" fill="#002776"/>
    <!-- White band (arc-like, simplified as a slightly rotated ellipse strip) -->
    <path d="M14.5,27 Q24,20 33.5,27" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Stars: simplified 4 small dots -->
    <circle cx="19" cy="23" r="1.2" fill="#FFFFFF"/>
    <circle cx="24" cy="21" r="1.2" fill="#FFFFFF"/>
    <circle cx="29" cy="23" r="1.2" fill="#FFFFFF"/>
    <circle cx="24" cy="28" r="1.0" fill="#FFFFFF"/>
  </g>
</svg>
