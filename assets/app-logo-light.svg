<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gear teeth -->
  <g filter="url(#glow)" fill="#C04A10" opacity="0.9">
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(0   256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(30  256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(60  256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(90  256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(120 256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(150 256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(180 256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(210 256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(240 256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(270 256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(300 256 256)"/>
    <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(330 256 256)"/>
  </g>

  <!-- Gear body -->
  <circle cx="256" cy="256" r="170" fill="#E8601C"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#FF9A5C" stroke-width="4" opacity="0.4"/>

  <!-- Inner cut-out (white for light bg) -->
  <circle cx="256" cy="256" r="138" fill="white"/>
  <circle cx="256" cy="256" r="138" fill="none" stroke="#C04A10" stroke-width="2" opacity="0.25"/>

  <!-- Tick marks -->
  <g stroke="#C04A10" stroke-width="3" stroke-linecap="round" opacity="0.3">
    <line x1="256" y1="118" x2="256" y2="136" transform="rotate(0   256 256)"/>
    <line x1="256" y1="118" x2="256" y2="136" transform="rotate(60  256 256)"/>
    <line x1="256" y1="118" x2="256" y2="136" transform="rotate(120 256 256)"/>
    <line x1="256" y1="118" x2="256" y2="136" transform="rotate(180 256 256)"/>
    <line x1="256" y1="118" x2="256" y2="136" transform="rotate(240 256 256)"/>
    <line x1="256" y1="118" x2="256" y2="136" transform="rotate(300 256 256)"/>
  </g>

  <!-- Tower -->
  <g filter="url(#softglow)">
    <path d="M 196,202 Q 160,256 196,310" fill="none" stroke="#C04A10" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
    <path d="M 316,202 Q 352,256 316,310" fill="none" stroke="#C04A10" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
    <path d="M 220,222 Q 196,256 220,290" fill="none" stroke="#C04A10" stroke-width="10" stroke-linecap="round"/>
    <path d="M 292,222 Q 316,256 292,290" fill="none" stroke="#C04A10" stroke-width="10" stroke-linecap="round"/>
    <rect x="249" y="184" width="14" height="96" rx="4" fill="#C04A10"/>
    <line x1="256" y1="280" x2="228" y2="316" stroke="#C04A10" stroke-width="10" stroke-linecap="round"/>
    <line x1="256" y1="280" x2="284" y2="316" stroke="#C04A10" stroke-width="10" stroke-linecap="round"/>
    <rect x="220" y="312" width="72" height="10" rx="5" fill="#C04A10"/>
  </g>

  <circle cx="256" cy="200" r="9" fill="#E8601C"/>
</svg>
