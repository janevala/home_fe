<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8601C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8601C" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="appShape">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#appShape)">
    <rect width="512" height="512" fill="url(#bgGrad)"/>
    <rect width="512" height="512" fill="url(#centerGlow)"/>

    <!-- Gear teeth: 12 × rounded rects rotated around center -->
    <g filter="url(#glow)" fill="#E8601C" opacity="0.9">
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(0   256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(30  256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(60  256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(90  256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(120 256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(150 256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(180 256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(210 256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(240 256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(270 256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(300 256 256)"/>
      <rect x="240" y="48" width="32" height="52" rx="8" transform="rotate(330 256 256)"/>
    </g>

    <!-- Main gear body -->
    <circle cx="256" cy="256" r="170" fill="#E8601C" filter="url(#glow)"/>
    <circle cx="256" cy="256" r="170" fill="none" stroke="#FF9A5C" stroke-width="4" opacity="0.5"/>

    <!-- Inner dark well -->
    <circle cx="256" cy="256" r="138" fill="#0D1117"/>
    <circle cx="256" cy="256" r="138" fill="none" stroke="#E8601C" stroke-width="2" opacity="0.35"/>

    <!-- Tick marks at 60° intervals -->
    <g stroke="#E8601C" stroke-width="3" stroke-linecap="round" opacity="0.4">
      <line x1="256" y1="118" x2="256" y2="136" transform="rotate(0   256 256)"/>
      <line x1="256" y1="118" x2="256" y2="136" transform="rotate(60  256 256)"/>
      <line x1="256" y1="118" x2="256" y2="136" transform="rotate(120 256 256)"/>
      <line x1="256" y1="118" x2="256" y2="136" transform="rotate(180 256 256)"/>
      <line x1="256" y1="118" x2="256" y2="136" transform="rotate(240 256 256)"/>
      <line x1="256" y1="118" x2="256" y2="136" transform="rotate(300 256 256)"/>
    </g>

    <!-- Broadcast tower — perfectly left-right symmetric -->
    <g filter="url(#softglow)">
      <!-- Outer signal arcs (symmetric) -->
      <path d="M 196,202 Q 160,256 196,310" fill="none" stroke="#FF8C42" stroke-width="9" stroke-linecap="round" opacity="0.55"/>
      <path d="M 316,202 Q 352,256 316,310" fill="none" stroke="#FF8C42" stroke-width="9" stroke-linecap="round" opacity="0.55"/>

      <!-- Inner signal arcs -->
      <path d="M 220,222 Q 196,256 220,290" fill="none" stroke="#FF8C42" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
      <path d="M 292,222 Q 316,256 292,290" fill="none" stroke="#FF8C42" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

      <!-- Center vertical mast -->
      <rect x="249" y="184" width="14" height="96" rx="4" fill="#FFB070"/>

      <!-- Base spread legs (symmetric V) -->
      <line x1="256" y1="280" x2="228" y2="316" stroke="#FFB070" stroke-width="10" stroke-linecap="round"/>
      <line x1="256" y1="280" x2="284" y2="316" stroke="#FFB070" stroke-width="10" stroke-linecap="round"/>

      <!-- Base foot bar -->
      <rect x="220" y="312" width="72" height="10" rx="5" fill="#FFB070"/>
    </g>

    <!-- Center broadcast dot -->
    <circle cx="256" cy="200" r="9" fill="#FFD4A0" filter="url(#softglow)"/>

  </g>
</svg>
